# Render Blueprint — monorepo Nexus
# Produção: front https://nexus-1-yc96.onrender.com | API https://nexus-97mq.onrender.com
# Não defina PORT: o Render injeta process.env.PORT; Nest usa em backend/src/main.ts.

services:
  - type: web
    name: nexus-backend
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    buildFilter:
      paths:
        - backend/**
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: DB_SSL
        value: "true"
      - key: CORS_ORIGINS
        value: https://nexus-1-yc96.onrender.com,http://localhost:5173,http://127.0.0.1:5173

  - type: web
    name: nexus-frontend
    runtime: static
    region: oregon
    plan: starter
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./frontend/dist
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: VITE_API_URL
        value: https://nexus-97mq.onrender.com
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
