# Render.com configuration for monorepo
# Deploy from develop branch (configure in Render dashboard)

services:
  # Backend Service
  - type: web
    name: nexus-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: cd backend && npm ci && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false  # Configure in Render dashboard
      - key: GEMINI_API_KEY
        sync: false  # Configure in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: DB_SSL
        value: "true"
    healthCheckPath: /
    
  # Frontend Service
  - type: web
    name: nexus-frontend
    env: static
    region: oregon
    plan: starter
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://nexus-backend.onrender.com  # Update with your backend URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
